<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoldForge — Tokenomics Model</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --m: 'JetBrains Mono', monospace; --g: 'Space Grotesk', sans-serif; --gold: #C8A960; --bg: #0C0B08; --card: #13110D; --border: #1F1C17; --dim: #504838; --mid: #7A6E58; --burn: #B85C3A; --green: #6B8F71; --light: #E8D48B; --text: #D4C9A8; }
  body { background: var(--bg); color: var(--text); font-family: var(--g); min-height: 100vh; padding: 24px 14px; }
  .wrap { max-width: 780px; margin: 0 auto; }
  .mono { font-family: var(--m); }
  
  /* Header */
  .header { text-align: center; margin-bottom: 32px; }
  .logo { width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 12px; position: relative;
    background: conic-gradient(from 0deg, #8B6914, #E8D48B, #C8A960, #6B4F10, #8B6914);
    box-shadow: 0 0 40px rgba(200,169,96,0.2), inset 0 0 14px rgba(0,0,0,0.4); }
  .logo-inner { position: absolute; inset: 8px; border-radius: 50%; background: var(--bg); }
  .header h1 { font-size: 36px; font-weight: 700; color: var(--gold); letter-spacing: -0.04em; }
  .header .sub { font-size: 10px; color: var(--dim); font-family: var(--m); margin-top: 4px; letter-spacing: 0.15em; }
  .header .desc { font-size: 11px; color: var(--mid); margin-top: 10px; max-width: 520px; margin-left: auto; margin-right: auto; line-height: 1.6; }

  /* Pillars */
  .pillars { display: flex; gap: 8px; margin-bottom: 28px; }
  .pillar { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .pillar-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .pillar-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: var(--bg); font-size: 11px; font-weight: 700; font-family: var(--m); }
  .pillar-title { font-size: 13px; font-weight: 700; }
  .pillar-desc { font-size: 9px; color: var(--mid); font-family: var(--m); line-height: 1.6; }

  /* Stats */
  .stats { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; flex: 1; min-width: 140px; }
  .stat-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .stat-label { font-size: 8px; color: var(--dim); font-family: var(--m); text-transform: uppercase; letter-spacing: 0.1em; }
  .stat-val { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .stat-sub { font-size: 9px; color: var(--dim); font-family: var(--m); margin-top: 4px; }

  /* Explainer */
  .explain { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 28px; }
  .explain-title { font-size: 11px; font-weight: 700; color: var(--gold); margin-bottom: 8px; font-family: var(--m); }
  .explain-body { font-size: 10px; color: var(--mid); font-family: var(--m); line-height: 1.8; }
  .explain-body .hl { color: var(--gold); }
  .explain-body .hlb { color: var(--burn); }

  /* Chart */
  .chart { margin-bottom: 28px; }
  .chart-title { font-size: 13px; font-weight: 700; color: var(--gold); }
  .chart-sub { font-size: 9px; color: var(--mid); font-family: var(--m); margin-top: 2px; }
  .chart svg { width: 100%; height: auto; display: block; margin-top: 6px; }
  .chart-legend { display: flex; gap: 14px; margin-top: 4px; padding-left: 54px; flex-wrap: wrap; }
  .chart-legend span { font-size: 8px; color: var(--mid); font-family: var(--m); display: flex; align-items: center; gap: 5px; }
  .chart-legend i { width: 10px; height: 3px; border-radius: 1px; display: inline-block; }

  /* Tiers */
  .tiers { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 24px; }
  .tier { background: var(--card); border-radius: 8px; padding: 10px 4px; text-align: center; }
  .tier-emoji { font-size: 16px; }
  .tier-label { font-size: 13px; font-weight: 700; margin-top: 2px; }
  .tier-days { font-size: 8px; color: var(--dim); font-family: var(--m); }
  .tier-pct { font-size: 14px; font-weight: 700; margin-top: 6px; }
  .tier-of { font-size: 7px; color: #3D362A; font-family: var(--m); }

  /* Table */
  .tbl { width: 100%; border-collapse: collapse; font-family: var(--m); font-size: 10px; }
  .tbl th { padding: 6px 8px; text-align: left; color: var(--dim); font-weight: 500; font-size: 8px; text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid #2A2520; }
  .tbl td { padding: 6px 8px; border-bottom: 1px solid #1A1610; }

  /* Toggle */
  .toggle-wrap { text-align: center; margin-bottom: 20px; }
  .toggle-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); border-radius: 8px; padding: 10px 28px; cursor: pointer;
    font-family: var(--m); font-size: 11px; font-weight: 700; letter-spacing: 0.05em; transition: all 0.2s; }
  .toggle-btn:hover { background: var(--gold); color: var(--bg); }
  .toggle-btn.active { background: var(--gold); color: var(--bg); }

  /* Sliders panel */
  .params { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; margin-bottom: 28px; display: none; }
  .params.show { display: block; }
  .params-section { font-size: 11px; font-weight: 700; color: var(--gold); margin-bottom: 12px; }
  .params-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px; }
  .param { margin-bottom: 14px; }
  .param-head { display: flex; justify-content: space-between; margin-bottom: 2px; }
  .param-label { font-size: 10px; color: var(--mid); font-family: var(--m); }
  .param-val { font-size: 10px; color: var(--gold); font-family: var(--m); font-weight: 700; }
  .param input[type=range] { width: 100%; height: 4px; -webkit-appearance: none; appearance: none; background: #1A1610; border-radius: 2px; outline: none; border: 1px solid #2A2520; }
  .param input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #E8D48B, #8B6914); border: 2px solid var(--bg); box-shadow: 0 0 6px rgba(200,169,96,0.3); cursor: pointer; }
  .param .hint { font-size: 7px; color: #3D362A; font-family: var(--m); margin-top: 1px; }
  .sep { border-top: 1px solid var(--border); margin: 14px 0; padding-top: 14px; }

  .footer { text-align: center; padding: 20px 0 8px; }
  .footer div { font-family: var(--m); }

  @media (max-width: 600px) {
    .pillars { flex-direction: column; }
    .stats { flex-direction: column; }
    .tiers { grid-template-columns: repeat(4, 1fr); }
    .params-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
// ═══ SIMULATION ═══
const CAP = 160750000;
const TIERS = [
  {days:8,label:"8d",color:"#504838",emoji:"⚡"},
  {days:28,label:"28d",color:"#6B5F4E",emoji:"🌙"},
  {days:90,label:"90d",color:"#7A6E58",emoji:"🔥"},
  {days:369,label:"369d",color:"#8B7D62",emoji:"⚔"},
  {days:888,label:"888d",color:"#B8A070",emoji:"🛡"},
  {days:1689,label:"1689d",color:"#C8A960",emoji:"👑"},
  {days:3888,label:"3888d",color:"#E8D48B",emoji:"💎"},
];

let P = {
  decay: 0.22, stakerS: 0.80, stakerE: 0.15, costEsc: 2.8, apr: 0.038, years: 25,
  bnbS: 0.85, bnbE: 0.0, bnbMid: 0.35, bnbSteep: 10,
  poolPow: 1.65, rankDec: 0.0008,
};

function simulate() {
  const steps = P.years * 12, data = [];
  let minted=0, vault=0, staked=0, cumY=0, cumD=0, gBurned=0, yCross=null, bCross=null;
  for (let i=0; i<=steps; i++) {
    const t=i/12, prog=minted/CAP, rem=CAP-minted;
    const em = rem*(1-Math.exp(-P.decay/12)); minted+=em;
    const cost = 0.00005*Math.pow(P.costEsc, prog), ethIn=em*cost;
    const s1 = 1/(1+Math.exp(-12*(prog-0.4)));
    const sPct = P.stakerS+(P.stakerE-P.stakerS)*s1;
    const s2 = 1/(1+Math.exp(-P.bnbSteep*(prog-P.bnbMid)));
    const bPct = P.bnbS+(P.bnbE-P.bnbS)*s2;
    const eBnb=ethIn*bPct, eVault=ethIn*(1-bPct);
    vault+=eVault; staked=vault;
    const yld=staked*(P.apr/12); cumY+=yld; cumD+=eBnb;
    const burned=cost>0?(eBnb+yld)/cost:0; gBurned+=burned;
    const circ=Math.max(0,minted-gBurned), nav=circ>0?vault/circ:0;
    if(!yCross&&yld>eBnb&&i>2) yCross=i;
    if(!bCross&&(1-bPct)>bPct&&i>0) bCross=i;
    data.push({
      month:i, year:t, label:t%1===0?`Y${Math.floor(t)}`:"",
      minted:minted/1e6, emission:em/1e3, prog:prog*100,
      sPct:sPct*100, mPct:(1-sPct)*100, bPct:bPct*100, vPct:(1-bPct)*100,
      mYield:yld, mDirect:eBnb, cumY, cumD,
      vault, cost:cost*1e6, circ:circ/1e6, burned:gBurned/1e6, nav:nav*1e6,
    });
  }
  return {data, yCross, bCross};
}

function simLadder() {
  const days=TIERS.map(t=>t.days);
  const raw=days.map(d=>Math.pow(d,P.poolPow)), tot=raw.reduce((a,b)=>a+b,0);
  const pcts=raw.map(w=>(w/tot)*100);
  const S=1e9, rData=[];
  for(let d=0;d<=3888;d+=8){
    const r=S*Math.exp(-P.rankDec*d);
    rData.push({day:d,year:d/365,label:d%730===0?`Y${Math.floor(d/365)}`:"",rank:r/1e6,mult:Math.min(S/r,500)});
  }
  const sc=[0,90,365,730,1095,1825,2555].map(d=>{
    const r=S*Math.exp(-P.rankDec*d), p=(S*100)/r;
    return{day:d,label:d===0?"Day 1":d<365?`D${d}`:`Y${(d/365).toFixed(1)}`,rankM:(r/1e6).toFixed(0)+"M",sw:r*100,cost:Math.round(p),mx:(p/100).toFixed(1)};
  });
  return{pcts,rData,sc};
}

// ═══ SVG CHART BUILDER ═══
function buildChart(data, lines, opts) {
  const W=700, H=opts.h||190, pad={t:14,r:18,b:30,l:54};
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  const vals = opts.stack
    ? data.map(d=>lines.reduce((s,l)=>s+(d[l.k]||0),0))
    : lines.flatMap(l=>data.map(d=>d[l.k]||0));
  const mxY=Math.max(...vals)*1.12||1;
  const xP=i=>pad.l+(i/Math.max(data.length-1,1))*cW;
  const yP=v=>pad.t+cH-(v/mxY)*cH;
  const fY=opts.fmtY||(v=>v>=1e6?(v/1e6).toFixed(1)+"M":v>=1e3?(v/1e3).toFixed(1)+"K":v>=1?v.toFixed(1):v.toFixed(2));
  const uid="c"+Math.random().toString(36).slice(2,5);

  const pd=(k,b)=>data.map((d,i)=>{const v=b?(d[b]||0)+(d[k]||0):(d[k]||0);return`${i===0?"M":"L"}${xP(i).toFixed(1)},${yP(v).toFixed(1)}`;}).join("");
  const ad=(k,b)=>{
    const top=pd(k,b);
    if(b){const bot=[...data].reverse().map((d,i)=>`L${xP(data.length-1-i).toFixed(1)},${yP(d[b]||0).toFixed(1)}`).join("");return top+bot+"Z";}
    return top+`L${xP(data.length-1).toFixed(1)},${yP(0).toFixed(1)}L${xP(0).toFixed(1)},${yP(0).toFixed(1)}Z`;
  };

  let defs=lines.map((l,i)=>`<linearGradient id="${uid}-${l.k}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${l.c}" stop-opacity="0.25"/><stop offset="100%" stop-color="${l.c}" stop-opacity="0.02"/></linearGradient>`).join("");
  let grid=Array.from({length:4},(_,i)=>mxY*((i+1)/4)).map(gv=>`<line x1="${pad.l}" x2="${W-pad.r}" y1="${yP(gv)}" y2="${yP(gv)}" stroke="#1F1C17" stroke-width="1"/><text x="${pad.l-8}" y="${yP(gv)+4}" fill="#504838" font-size="8" text-anchor="end" font-family="var(--m)">${fY(gv)}</text>`).join("");
  grid+=`<line x1="${pad.l}" x2="${W-pad.r}" y1="${yP(0)}" y2="${yP(0)}" stroke="#1F1C17" stroke-width="1"/>`;
  let ticks=data.filter(d=>d.label&&(d.month!==undefined?d.month%24===0:d.day%730===0)).map(d=>`<text x="${xP(data.indexOf(d))}" y="${H-6}" fill="#504838" font-size="8" text-anchor="middle" font-family="var(--m)">${d.label}</text>`).join("");

  let anno="";
  if(opts.anno){
    const aX=xP(opts.anno.month||0);
    anno=`<line x1="${aX}" x2="${aX}" y1="${pad.t}" y2="${pad.t+cH}" stroke="#C8A960" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/><text x="${aX+5}" y="${pad.t+12}" fill="#C8A960" font-size="7" font-family="var(--m)" font-weight="600">${opts.anno.label}</text>`;
  }

  let paths="";
  if(opts.stack){
    if(lines.length>=2) paths+=`<path d="${ad(lines[1].k,lines[0].k)}" fill="url(#${uid}-${lines[1].k})"/>`;
    paths+=`<path d="${ad(lines[0].k)}" fill="url(#${uid}-${lines[0].k})"/>`;
    paths+=`<path d="${pd(lines[0].k)}" fill="none" stroke="${lines[0].c}" stroke-width="2"/>`;
    if(lines.length>=2) paths+=`<path d="${pd(lines[1].k,lines[0].k)}" fill="none" stroke="${lines[1].c}" stroke-width="2"/>`;
  } else {
    lines.forEach(l=>{
      if(opts.area) paths+=`<path d="${ad(l.k)}" fill="url(#${uid}-${l.k})"/>`;
      paths+=`<path d="${pd(l.k)}" fill="none" stroke="${l.c}" stroke-width="2" stroke-linejoin="round"/>`;
    });
  }

  let yLabel=`<text x="12" y="${pad.t+cH/2}" fill="#504838" font-size="8" text-anchor="middle" font-family="var(--m)" transform="rotate(-90,12,${pad.t+cH/2})">${opts.yL||""}</text>`;
  let legend=lines.map(l=>`<span><i style="background:${l.c}"></i>${l.n}</span>`).join("");

  return `<div class="chart">
    <div class="chart-title">${opts.title}</div>
    ${opts.sub?`<div class="chart-sub">${opts.sub}</div>`:""}
    <svg viewBox="0 0 ${W} ${H}"><defs>${defs}</defs>${grid}${ticks}${anno}${paths}${yLabel}</svg>
    <div class="chart-legend">${legend}</div>
  </div>`;
}

// ═══ RENDER ═══
function render() {
  const {data, yCross, bCross} = simulate();
  const {pcts, rData, sc} = simLadder();
  const f = data[data.length-1];
  const ycY = yCross?(yCross/12).toFixed(1):"—";
  const bcY = bCross?(bCross/12).toFixed(1):"—";
  const ycA = yCross?{month:yCross,label:`YIELD TAKEOVER Y${ycY}`}:null;
  const bcA = bCross?{month:bCross,label:`VAULT > BNB Y${bcY}`}:null;

  let html = `
  <!-- HEADER -->
  <div class="header">
    <div class="logo"><div class="logo-inner"></div></div>
    <h1>GoldForge</h1>
    <div class="sub">160,750,000 GOLD — ONE PER TROY OUNCE OF EARTH'S MINEABLE GOLD</div>
    <div class="desc">Burn XEN to mine GOLD. Stake GOLD to earn ETH. The protocol's treasury stakes ETH and uses the yield to buy & burn GOLD — forever. Supply only goes down.</div>
  </div>

  <!-- PILLARS -->
  <div class="pillars">
    <div class="pillar"><div class="pillar-head"><div class="pillar-num" style="background:var(--green)">1</div><div class="pillar-title" style="color:var(--green)">MINE</div></div>
      <div class="pillar-desc">Burn XEN → mint GOLD. Cost rises as supply approaches the 160.75M cap. Early miners pay fractions. Late miners pay multiples.</div></div>
    <div class="pillar"><div class="pillar-head"><div class="pillar-num" style="background:var(--gold)">2</div><div class="pillar-title" style="color:var(--gold)">STAKE</div></div>
      <div class="pillar-desc">Lock GOLD in 7 payout tiers (8d → 3888d). Longer locks = bigger share of ETH fees. Ranking rewards Day 1 believers.</div></div>
    <div class="pillar"><div class="pillar-head"><div class="pillar-num" style="background:var(--burn)">3</div><div class="pillar-title" style="color:var(--burn)">BURN</div></div>
      <div class="pillar-desc">Protocol treasury stakes ETH, uses yield to buy & burn GOLD off the market. Forever. The vault principal is never spent.</div></div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><div class="stat-head"><span>⛏</span><span class="stat-label">Supply</span></div>
      <div class="stat-val" style="color:var(--gold)">${f.minted.toFixed(1)}M</div><div class="stat-sub">${f.prog.toFixed(0)}% minted after ${P.years}y</div></div>
    <div class="stat"><div class="stat-head"><span>🔥</span><span class="stat-label">Burned</span></div>
      <div class="stat-val" style="color:var(--burn)">${f.burned.toFixed(2)}M</div><div class="stat-sub">${f.circ.toFixed(1)}M circulating</div></div>
    <div class="stat"><div class="stat-head"><span>🏦</span><span class="stat-label">Vault</span></div>
      <div class="stat-val" style="color:var(--gold)">${f.vault.toFixed(1)} ETH</div><div class="stat-sub">permanently staked</div></div>
    <div class="stat"><div class="stat-head"><span>♾</span><span class="stat-label">Forever BNB</span></div>
      <div class="stat-val" style="color:var(--green)">Y${ycY}</div><div class="stat-sub">yield burn > direct burn</div></div>
  </div>

  <!-- DUAL SPLITS EXPLAINER -->
  <div class="explain">
    <div class="explain-title">THE CORE MECHANIC: TWO PARALLEL CURVES</div>
    <div class="explain-body">
      <p style="margin-bottom:6px">GoldForge runs on <span class="hl">two dynamic splits</span> that both follow the same principle: start aggressive, decay toward permanence. Both are driven by mint progress — not time — so they self-regulate based on actual demand.</p>
      <p style="margin-bottom:4px"><span class="hl">Split 1 — Staker vs Miner:</span> Early on, 80% of miner ETH fees go to stakers. This creates massive APY that incentivizes locking GOLD. As supply matures, the split shifts toward miners, keeping mining profitable even as costs rise.</p>
      <p><span class="hlb">Split 2 — Buy & Burn vs Vault:</span> Early on, 85% of protocol ETH goes directly to buying and burning GOLD (TitanX-style hype). As supply matures, ETH shifts into the permanent vault. The vault stakes ETH and uses yield to burn GOLD forever.</p>
    </div>
  </div>`;

  // Charts
  html += buildChart(data, [{k:"sPct",n:"Stakers",c:"#C8A960"},{k:"mPct",n:"Miners",c:"#6B8F71"}],
    {title:"STAKER vs MINER SPLIT",sub:"Who earns ETH fees — shifts from staker-heavy to miner-heavy as supply matures",yL:"%",h:170});

  html += buildChart(data, [{k:"bPct",n:"Buy & Burn",c:"#B85C3A"},{k:"vPct",n:"Vault",c:"#C8A960"}],
    {title:"BUY & BURN vs VAULT SPLIT",sub:"How protocol ETH is deployed — aggressive burns taper into permanent endowment",yL:"%",h:170,anno:bcA});

  html += buildChart(data, [{k:"emission",n:"Monthly (K tokens)",c:"#C8A960"}],
    {title:"TOKEN EMISSION",sub:"Asymptotic decay — 50% minted by ~Y3, 80% by ~Y7, 95% by ~Y13",yL:"K tokens",area:true});

  html += buildChart(data, [{k:"cost",n:"Cost per GOLD (μETH)",c:"#E8D48B"}],
    {title:"MINING COST",sub:"Exponential — early miners pay fractions, late miners pay 2.8x base cost",yL:"μETH",h:160,area:true});

  html += `<div class="explain">
    <div class="explain-title">THE TREASURY: HOW TITANX SHOULD HAVE WORKED</div>
    <div class="explain-body">TitanX spent $17M in aggressive buy & burn within months — massive hype, empty treasury.
      GoldForge starts with the same aggression but <span class="hl">gradually shifts ETH into a permanent staking vault</span>.
      The vault's yield funds buy & burn forever. You get the hype AND the endowment.</div>
  </div>`;

  html += buildChart(data, [{k:"mYield",n:"From Yield (forever)",c:"#6B8F71"},{k:"mDirect",n:"Direct BNB (tapering)",c:"#B85C3A"}],
    {title:"MONTHLY BUY & BURN: DIRECT vs YIELD",sub:"Direct burns taper. Yield burns rise. The crossover is when the protocol becomes self-sustaining.",yL:"ETH/mo",h:200,anno:ycA});

  html += buildChart(data, [{k:"cumY",n:"From Yield",c:"#6B8F71"},{k:"cumD",n:"Direct",c:"#B85C3A"}],
    {title:"CUMULATIVE BUY & BURN",sub:"Total ETH spent burning GOLD — the green stream never stops",yL:"ETH",h:200,stack:true,anno:ycA});

  html += buildChart(data, [{k:"vault",n:"Vault ETH",c:"#C8A960"}],
    {title:"VAULT GROWTH",sub:"ETH permanently staked — the endowment that funds forever burns",yL:"ETH",h:180,area:true});

  html += buildChart(data, [{k:"minted",n:"Minted (M)",c:"#504838"},{k:"circ",n:"Circulating (M)",c:"#C8A960"}],
    {title:"CIRCULATING SUPPLY",sub:"Minted minus burned — the gap only widens",yL:"M",h:180});

  html += buildChart(data, [{k:"nav",n:"NAV (μETH)",c:"#E8D48B"}],
    {title:"NAV PER TOKEN",sub:"Vault ETH backing per circulating GOLD — rises as burns compress supply",yL:"μETH",h:180,area:true});

  // STAKE LADDER
  html += `<div class="explain">
    <div class="explain-title">THE STAKE LADDER: 7 TIERS, 8 DAYS TO 10.6 YEARS</div>
    <div class="explain-body">Stake GOLD to earn ETH from miner fees. Longer locks earn exponentially more.
      Your <span style="color:#E8D48B">rank</span> starts at 1 Billion on Day 1 and decays daily.
      Late entrants must stake more GOLD to match early stakers' share weight — creating constant buy pressure.</div>
  </div>`;

  html += `<div class="tiers">${TIERS.map((t,i)=>`<div class="tier" style="border:1px solid ${t.color}22">
    <div class="tier-emoji">${t.emoji}</div>
    <div class="tier-label" style="color:${t.color}">${t.label}</div>
    <div class="tier-days">${t.days<365?t.days+" days":(t.days/365).toFixed(1)+" yrs"}</div>
    <div class="tier-pct" style="color:${t.color}">${pcts[i].toFixed(1)}%</div>
    <div class="tier-of">of fees</div>
  </div>`).join("")}</div>`;

  html += buildChart(rData, [{k:"rank",n:"Rank (Millions)",c:"#C8A960"}],
    {title:"RANK DECAY",sub:"Start: 1 Billion — late stakers get lower ranks and must buy more GOLD for equivalent payouts",yL:"Rank (M)",h:180,area:true});

  html += buildChart(rData, [{k:"mult",n:"Cost Multiplier",c:"#B85C3A"}],
    {title:"COST TO MATCH DAY 1",sub:"Multiplier: how many X more $ a late staker needs to match Day 1's $100 share weight",yL:"X",h:180,area:true,fmtY:v=>v.toFixed(0)+"x"});

  // Scenario table
  html += `<div class="explain">
    <div class="explain-title">LATE ENTRY COST</div>
    <div class="explain-body" style="margin-bottom:10px">How much to match a Day 1 staker's $100 position</div>
    <table class="tbl"><thead><tr>${["When","Rank","$100 Weight","Parity $","Multiple"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
    <tbody>${sc.map((s,i)=>`<tr>
      <td style="color:${i===0?"var(--gold)":"var(--text)"};font-weight:${i===0?700:400}">${s.label}</td>
      <td style="color:var(--light)">${s.rankM}</td>
      <td style="color:var(--dim)">${(s.sw/1e9).toFixed(2)}B</td>
      <td style="color:${s.cost>500?"var(--burn)":s.cost>200?"var(--gold)":"var(--green)"};font-weight:700">$${s.cost.toLocaleString()}</td>
      <td style="color:var(--mid)">${s.mx}x</td>
    </tr>`).join("")}</tbody></table>
  </div>`;

  // Toggle + params
  html += `<div class="toggle-wrap"><button class="toggle-btn" id="toggleBtn" onclick="toggleParams()">SHOW ADVANCED PARAMETERS</button></div>`;

  const sliders = [
    {section:"EMISSION & COST", items:[
      {id:"decay",label:"Emission Decay",min:0.08,max:0.5,step:0.01,fmt:v=>v.toFixed(2),hint:"0.22 = ~50% by Y3"},
      {id:"costEsc",label:"Cost Escalation",min:1.5,max:6,step:0.1,fmt:v=>v.toFixed(1)+"x"},
      {id:"apr",label:"ETH Staking APR",min:0.015,max:0.08,step:0.005,fmt:v=>(v*100).toFixed(1)+"%"},
      {id:"years",label:"Simulation",min:5,max:40,step:1,fmt:v=>v+" years"},
    ]},
    {section:"SPLIT 1: STAKER vs MINER", items:[
      {id:"stakerS",label:"Staker % Early",min:0.5,max:0.95,step:0.05,fmt:v=>(v*100).toFixed(0)+"%",hint:"80% = massive early yield"},
      {id:"stakerE",label:"Staker % Late",min:0.05,max:0.4,step:0.05,fmt:v=>(v*100).toFixed(0)+"%"},
    ]},
    {section:"SPLIT 2: BUY & BURN vs VAULT",color:"var(--burn)", items:[
      {id:"bnbS",label:"BNB % Early",min:0.5,max:0.95,step:0.05,fmt:v=>(v*100).toFixed(0)+"%",hint:"85% = TitanX blitz"},
      {id:"bnbE",label:"BNB % Late",min:0,max:0.3,step:0.05,fmt:v=>(v*100).toFixed(0)+"%",hint:"0% = full endowment"},
      {id:"bnbMid",label:"Crossover Point",min:0.15,max:0.6,step:0.05,fmt:v=>(v*100).toFixed(0)+"% mint"},
      {id:"bnbSteep",label:"Transition Speed",min:4,max:20,step:1,fmt:v=>v.toFixed(0),hint:"Higher = sharper"},
    ]},
    {section:"STAKE LADDER",color:"var(--light)", items:[
      {id:"poolPow",label:"Pool Power",min:1,max:2.5,step:0.05,fmt:v=>v.toFixed(2),hint:"1=linear 2=quadratic"},
      {id:"rankDec",label:"Rank Decay",min:0.0002,max:0.003,step:0.0001,fmt:v=>v.toFixed(4)},
    ]},
  ];

  html += `<div class="params" id="paramsPanel">`;
  sliders.forEach((sec,si) => {
    if(si>0) html += `<div class="sep"></div>`;
    html += `<div class="params-section" style="color:${sec.color||'var(--gold)'}">${sec.section}</div><div class="params-grid">`;
    sec.items.forEach(s => {
      html += `<div class="param"><div class="param-head"><span class="param-label">${s.label}</span><span class="param-val" id="val-${s.id}">${s.fmt(P[s.id])}</span></div>
        <input type="range" min="${s.min}" max="${s.max}" step="${s.step}" value="${P[s.id]}" oninput="updateParam('${s.id}',this.value)">
        ${s.hint?`<div class="hint">${s.hint}</div>`:""}</div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  html += `<div class="footer"><div style="font-size:9px;color:#3D362A">GOLDFORGE TOKENOMICS MODEL v5 — SIMULATION ONLY — NOT FINANCIAL ADVICE</div>
    <div style="font-size:8px;color:#1F1C17;margin-top:4px">160,750,000 GOLD — One per troy ounce of Earth's remaining mineable gold</div></div>`;

  document.getElementById('app').innerHTML = html;
}

// Slider format functions (need to keep in sync)
const FMT = {
  decay:v=>parseFloat(v).toFixed(2), costEsc:v=>parseFloat(v).toFixed(1)+"x",
  apr:v=>(parseFloat(v)*100).toFixed(1)+"%", years:v=>v+" years",
  stakerS:v=>(parseFloat(v)*100).toFixed(0)+"%", stakerE:v=>(parseFloat(v)*100).toFixed(0)+"%",
  bnbS:v=>(parseFloat(v)*100).toFixed(0)+"%", bnbE:v=>(parseFloat(v)*100).toFixed(0)+"%",
  bnbMid:v=>(parseFloat(v)*100).toFixed(0)+"% mint", bnbSteep:v=>parseFloat(v).toFixed(0),
  poolPow:v=>parseFloat(v).toFixed(2), rankDec:v=>parseFloat(v).toFixed(4),
};

function updateParam(id, val) {
  P[id] = parseFloat(val);
  document.getElementById('val-'+id).textContent = FMT[id](val);
  // Debounced re-render
  clearTimeout(window._rt);
  window._rt = setTimeout(() => {
    const wasOpen = document.getElementById('paramsPanel').classList.contains('show');
    render();
    if(wasOpen) {
      document.getElementById('paramsPanel').classList.add('show');
      document.getElementById('toggleBtn').classList.add('active');
      document.getElementById('toggleBtn').textContent = 'HIDE PARAMETERS';
    }
  }, 150);
}

function toggleParams() {
  const panel = document.getElementById('paramsPanel');
  const btn = document.getElementById('toggleBtn');
  panel.classList.toggle('show');
  btn.classList.toggle('active');
  btn.textContent = panel.classList.contains('show') ? 'HIDE PARAMETERS' : 'SHOW ADVANCED PARAMETERS';
}

render();
</script>
</body>
</html>
